---
# Windows Server 2025 Domain Controller. Built FIRST (ISE needs its DNS at setup).
role: windc
ip: "{{ dc_ip }}"

# The reusable proxmox_vm role consumes this dict (same schema as ise1).
# seabios + SATA disk + e1000 NIC = all native Windows inbox drivers (no virtio inject).
vm_spec:
  vmid: 126
  name: "dc-demo"
  cores: 4
  memory: 8192
  bios: "seabios"
  ostype: "win11"                 # Proxmox enlightenments for Server 2022/2025
  scsihw: "virtio-scsi-single"
  disk_bus: "sata"
  disk_gb: 80
  nic_model: "e1000"
  install_iso: "windows_server_2025.iso"     # name as it appears in your ISO store
  build_answer_iso: true
  boot_order: "ide2;sata0"        # no ISO trap on Windows (the installer's "press any key" falls through)

# Exact /IMAGE/NAME from the install.wim (index 2 = Standard, Desktop Experience).
# List them with:  wiminfo <iso>/sources/install.wim   (or dism /Get-WimInfo)
win_image_name: "Windows Server 2025 SERVERSTANDARD"
win_hostname: "dc-demo"
