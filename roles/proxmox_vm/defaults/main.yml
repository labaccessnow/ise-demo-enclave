---
# Sensible vm_spec defaults; per-host files override what they need.
vm_spec:
  cores: 4
  memory: 8192
  bios: "seabios"
  ostype: "l26"
  scsihw: "virtio-scsi-single"
  disk_bus: "scsi"
  disk_gb: 80
  nic_model: "e1000"
  build_answer_iso: false
  serial: false
  boot_order: "ide2;scsi0"
# Set to false to create+configure the VM but not power it on.
vm_autostart: true
