---
# Provision the demo.lab enclave VMs on Proxmox. ONE role (proxmox_vm) builds
# either VM from its host_vars `vm_spec`. Run dc-demo first (ISE needs its DNS).
#
#   ansible-playbook provision.yml --limit dc-demo --ask-vault-pass
#   ... wait for the DC to promote the forest + serve DNS ...
#   ansible-playbook provision.yml --limit ise1   --ask-vault-pass
#
- name: Provision demo.lab enclave VM(s)
  hosts: enclave
  gather_facts: false
  connection: local        # work is delegated to localhost / the PVE API
  serial: 1                # one host at a time (keeps DC-before-ISE ordering)
  roles:
    - proxmox_vm
