---
# The enclave VMs. They are NOT SSH-reachable from the control machine (isolated
# VLAN) — all provisioning is delegated to the Proxmox API / localhost, so no
# connection to these hosts is required. dc-demo is listed first so provision.yml
# (serial: 1) builds it before ise1.
all:
  children:
    enclave:
      hosts:
        dc-demo: {}      # Windows Server 2025 Domain Controller
        ise1: {}         # Cisco ISE 3.4 node
